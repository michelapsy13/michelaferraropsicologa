<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michela Ferraro - Psicologa Clinica</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: rgba(250, 232, 228, 1);
            color: #333;
            scroll-behavior: smooth;
        }

        /* MENU LATERALE FISSO */
        .sidebar {
            width: 200px;
            height: 100vh;
            background-color: #333;
            padding-top: 20px;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px;
            font-size: 18px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: #575757;
        }

        /* SEZIONE 1: IMMAGINE A TUTTO SCHERMO */
        .hero {
            margin-left: 200px;
            height: 100vh;
            background: url('logomiki.png') no-repeat center center;
            background-size: cover; /* L'immagine copre tutto lo schermo */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hero-title {
            color: white;
            font-size: 60px;
            font-weight: normal;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5); /* Per leggere bene il nome sulla foto */
            margin: 0;
        }

        /* SEZIONE 2: CONTENUTO DOPO LO SCROLL */
        .main-content {
            margin-left: 200px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-around; /* Mette Home a sinistra e testo a destra */
            padding: 0 10%;
            box-sizing: border-box;
        }

        .home-label {
            font-size: 80px;
            font-weight: bold;
            color: rgba(0,0,0,0.05); /* Effetto testo grande sbiadito come reference */
            text-transform: uppercase;
        }

        .text-container {
            max-width: 500px;
            text-align: left;
        }

        .intro-text {
            font-size: 24px;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .quote-bottom {
            font-size: 20px;
            font-style: italic;
            color: #666;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%; height: auto; position: relative;
                display: flex; flex-wrap: wrap; justify-content: center;
            }
            .hero, .main-content { margin-left: 0; }
            .hero-title { font-size: 40px; }
            .main-content { flex-direction: column; text-align: center; }
            .home-label { font-size: 50px; margin-bottom: 20px; }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <a href="index.html">Home</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="cosa-faccio.html">Di cosa mi occupo</a>
        <a href="blog.html">Blog</a>
        <a href="contatti.html">Contatti</a>
    </div>

    <div class="hero">
        <h1 class="hero-title">Michela Ferraro</h1>
    </div>

    <div class="main-content">
        <div class="home-label">Home</div>

        <div class="text-container">
            <p class="intro-text">
                Sono una psicologa clinica e lavoro con adolescenti e giovani adulti, 
                accompagnandoli nei momenti di cambiamento, fatica e crescita.
            </p>
            
            <p class="quote-bottom">
                "Mostrare le tue ferite non ti rende debole, ti rende umano"
            </p>
        </div>
    </div>

</body>
</html>
