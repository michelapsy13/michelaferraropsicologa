<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Michela Ferraro</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background-color: rgba(250, 232, 228, 1);
            color: #333;
        }

        /* MENU LATERALE */
        .sidebar {
            width: 200px;
            height: 100vh;
            background-color: #333;
            padding-top: 20px;
            position: fixed;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px;
            font-size: 18px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: #575757;
        }

        /* CONTENUTO */
        .content {
            margin-left: 200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
        } 
        
        /* Immagine ingrandita */
        .content img {
            width: 80%;
            max-width: 900px; 
            height: auto;
            border-radius: 20px;
            margin-bottom: 15px; /* Margine ridotto per avvicinare gli elementi */
        }

        /* Testo citazione ingrandito */
        .quote {
            font-style: italic;
            font-size: 26px; /* Ingrandito */
            max-width: 700px;
            color: #555;
            margin-bottom: 15px; /* Margine ridotto */
            line-height: 1.3;
        }

        /* Nome Michela Ferraro */
        .intro-title {
            font-size: 36px; /* Ingrandito */
            margin-bottom: 10px; /* Margine ridotto */
            color: #222;
        }

        /* Testo presentazione ingrandito e in corsivo */
        .intro-text {
            font-size: 22px; /* Ingrandito */
            font-style: italic; /* Aggiunto corsivo */
            max-width: 700px;
            line-height: 1.5;
            margin: 0 auto;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                padding-top: 0;
            }

            .sidebar a {
                padding: 10px;
                font-size: 14px;
            }

            .content {
                margin-left: 0;
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <a href="index.html">Home</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="cosa-faccio.html">Di cosa mi occupo</a>
        <a href="blog.html">Blog</a>
        <a href="contatti.html">Contatti</a>
    </div>

    <div class="content">
        <img src="logomiki.png" alt="Michela Ferraro - Psicologa Clinica">
        
        <p class="quote">"Mostrare le tue ferite non ti rende debole, ti rende umano"</p>

        <h1 class="intro-title">Ciao, sono Michela Ferraro</h1>
        
        <p class="intro-text">
            Sono una psicologa clinica e lavoro con adolescenti e giovani adulti, 
            accompagnandoli nei momenti di cambiamento, fatica e crescita.
        </p>
    </div>

</body>
</html>
