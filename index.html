<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michela Ferraro - Psicologa Clinica</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: rgba(250, 232, 228, 1);
            color: #333;
            scroll-behavior: smooth;
        }

        /* MENU A TENDINA MINIMAL */
        .sidebar {
            position: fixed;
            left: 40px;
            top: 40px;
            z-index: 1000;
        }

        .menu-trigger {
            font-size: 20px;
            cursor: pointer;
            text-decoration: underline;
            font-weight: bold;
            color: #333;
            background: none;
            border: none;
            padding: 0;
        }

        .dropdown-content {
            display: none;
            margin-top: 10px;
            background-color: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .dropdown-content a {
            display: block;
            color: #333;
            text-decoration: none;
            padding: 10px 15px;
            font-size: 16px;
            transition: 0.3s;
        }

        .dropdown-content a:hover {
            background-color: #f5f5f5;
        }

        /* MOSTRA IL MENU AL CLICK */
        .sidebar:hover .dropdown-content {
            display: block;
        }

        /* SEZIONE 1: ALTO (SFONDO BIANCO) */
        .hero {
            height: 100vh;
            background-color: white; /* Sfondo bianco come richiesto */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero img {
            max-width: 400px;
            width: 80%;
            height: auto;
            margin-bottom: 20px;
        }

        .hero-title {
            color: #333;
            font-size: 45px;
            font-style: italic; /* Nome in corsivo */
            font-weight: normal;
            margin: 0;
        }

        /* SEZIONE 2: CONTENUTO (SFONDO ROSA) */
        .main-content {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10%;
            box-sizing: border-box;
        }

        .home-label {
            font-size: 120px;
            font-weight: bold;
            color: rgba(0,0,0,0.03); /* Scritta Home gigante e quasi invisibile */
            text-transform: uppercase;
            user-select: none;
        }

        .text-container {
            max-width: 550px;
            text-align: left;
        }

        .intro-text {
            font-size: 26px;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .quote-bottom {
            font-size: 20px;
            font-style: italic;
            color: #777;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 15px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero-title { font-size: 30px; }
            .main-content { flex-direction: column; text-align: center; }
            .home-label { font-size: 60px; margin-bottom: 20px; }
            .sidebar { left: 20px; top: 20px; }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <button class="menu-trigger">Menu</button>
        <div class="dropdown-content">
            <a href="index.html">Home</a>
            <a href="chi-sono.html">Chi sono</a>
            <a href="cosa-faccio.html">Di cosa mi occupo</a>
            <a href="blog.html">Blog</a>
            <a href="contatti.html">Contatti</a>
        </div>
    </div>

    <div class="hero">
        <img src="LogoMikipsy.png" alt="Michela Ferraro Logo">
        <h1 class="hero-title">Michela Ferraro</h1>
    </div>

    <div class="main-content">
        <div class="home-label">Home</div>

        <div class="text-container">
            <p class="intro-text">
                Sono una psicologa clinica e lavoro con adolescenti e giovani adulti, 
                accompagnandoli nei momenti di cambiamento, fatica e crescita.
            </p>
            
            <p class="quote-bottom">
                "Mostrare le tue ferite non ti rende debole, ti rende umano"
            </p>
        </div>
    </div>

</body>
</html>
