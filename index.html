<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background-color: rgba(250, 232, 228, 1);
        }

        /* MENU LATERALE */
        .sidebar {
            width: 200px;
            height: 100vh;
            background-color: #333;
            padding-top: 20px;
            position: fixed;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px;
            font-size: 18px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: #575757;
        }

        /* CONTENUTO */
        .content {
            margin-left: 200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        } 
        .content img {
            width: 60%;
            max-width: 800px;
            height: auto;
            border-radius: 20px;
            margin-bottom: 30px;
        }

       
        .quote {
            font-style: italic;
            font-size: 22px;
            max-width: 500px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                display: flex;
                justify-content: space-around;
            }

            .sidebar a {
                padding: 10px;
                font-size: 16px;
            }

            .content {
                margin-left: 0;
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- MENU -->
    <div class="sidebar">
        <a href="index.html">Home</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="cosa-faccio.html">Di cosa mi occupo</a>
        <a href="blog.html">Blog</a>
        <a href="contatti.html">Contatti</a>
    </div>

    <!-- CONTENUTO HOME -->
    <div class="content">
        <img src="logomiki.jpg" alt="La mia foto">
        <p class="quote">"Mostrare le tue ferite non ti rende debole, ti rende umano"</p>
    </div>

</body>
</html>
