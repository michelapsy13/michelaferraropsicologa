<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Michela Ferraro</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background-color: rgba(250, 232, 228, 1);
            color: #333;
        }

        /* MENU LATERALE */
        .sidebar {
            width: 200px;
            height: 100vh;
            background-color: #333;
            padding-top: 20px;
            position: fixed;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px;
            font-size: 18px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: #575757;
        }

        /* CONTENUTO */
        .content {
            margin-left: 200px;
            width: calc(100% - 200px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        } 

        /* Citazione SPOSTATA SOPRA */
        .quote {
            font-style: italic;
            font-size: 26px;
            max-width: 750px;
            color: #555;
            margin-bottom: 10px; /* Spazio tra frase e foto */
            line-height: 1.2;
        }
        
        /* Immagine TAGLIATA (Crop) */
        .content img {
            width: 85%;
            max-width: 950px; 
            height: 400px; /* Altezza fissa per forzare il taglio */
            object-fit: cover; /* Taglia i bordi mantenendo le proporzioni */
            object-position: center; /* Mantiene visibile la parte superiore dei soggetti */
            border-radius: 20px;
            margin-bottom: 15px;
        }

        /* Testo presentazione NUOVO STILE (Senza il Ciao sono...) */
        .intro-text {
            font-size: 24px;
            font-style: italic;
            max-width: 800px;
            line-height: 1.5;
            color: #222;
            margin-top: 0;
        }

        .name-highlight {
            font-weight: bold;
            font-style: normal; /* Il nome non è in corsivo per risaltare */
            font-size: 32px;
            display: block; /* Mette il nome su una riga tutta sua */
            margin-bottom: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%; height: auto; position: relative;
                display: flex; flex-wrap: wrap; justify-content: center;
            }
            .content { margin-left: 0; width: 100%; }
            .content img { height: 300px; } /* Più bassa su mobile */
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <a href="index.html">Home</a>
        <a href="chi-sono.html">Chi sono</a>
        <a href="cosa-faccio.html">Di cosa mi occupo</a>
        <a href="blog.html">Blog</a>
        <a href="contatti.html">Contatti</a>
    </div>

    <div class="content">
        <p class="quote">"Mostrare le tue ferite non ti rende debole, ti rende umano"</p>

        <img src="logomiki.png" alt="Michela Ferraro - Psicologa Clinica">
        
        <p class="intro-text">
            <span class="name-highlight">Michela Ferraro</span>
            Psicologa clinica, lavoro con adolescenti e giovani adulti, 
            accompagnandoli nei momenti di cambiamento, fatica e crescita.
        </p>
    </div>

</body>
</html>
